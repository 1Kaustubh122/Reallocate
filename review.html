<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Review</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff; /* White background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .review-container {
            width: 80%;
            max-width: 600px;
            padding: 20px;
            border-radius: 10px;
            background-color: #f0f0f0; /* Light grey background for contrast */
            color: #062f53; /* Blue text */
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
        }

        h2, h3 {
            color: #062f53; /* Dark blue for headings */
        }

        .star-rating {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .radio label svg {
            fill: #062f53; /* Blue color for the stars */
            cursor: pointer;
            transition: transform 0.3s ease;
            height: 30px; /* Adjusted height for better visibility */
            width: 30px; /* Adjusted width for better visibility */
        }

        .radio input {
            display: none;
        }

        .radio input:checked + label svg {
            transform: scale(1.2); /* Slightly increase the size of selected star */
        }

        .review-text textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #062f53; /* Blue border */
            font-size: 16px;
            background-color: #ffffff; /* White background for textarea */
            color: #062f53; /* Blue text */
            resize: none;
        }

        #submit-review {
            width: 100%;
            padding: 10px;
            background-color: #062f53; /* Blue background */
            color: #ffffff; /* White text */
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        #submit-review:hover {
            background-color: #1a5e8b; /* Darker shade of blue for hover effect */
        }
    </style>
</head>
<body>
    <div class="review-container">
        <h2>Review Service</h2>
        <div class="service-details">
            <p><strong>Provider:</strong> <span id="provider-name">John Doe</span></p>
            <p><strong>Date:</strong> <span id="service-date">October 1, 2024</span></p>
            <p><strong>Service Provided:</strong> <span id="service-provided">Plumbing Service</span></p>
        </div>

        <div class="rating-section">
            <h3>Rate the Service</h3>
            <div class="star-rating">
                <div class="radio">
                    <input id="rating-5" type="radio" name="rating" value="5" />
                    <label for="rating-5" title="5 stars">
                        <svg viewBox="0 0 576 512" xmlns="http://www.w3.org/2000/svg">
                            <path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path>
                        </svg>
                    </label>

                    <input id="rating-4" type="radio" name="rating" value="4" />
                    <label for="rating-4" title="4 stars">
                        <svg viewBox="0 0 576 512" xmlns="http://www.w3.org/2000/svg">
                            <path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path>
                        </svg>
                    </label>

                    <input id="rating-3" type="radio" name="rating" value="3" />
                    <label for="rating-3" title="3 stars">
                        <svg viewBox="0 0 576 512" xmlns="http://www.w3.org/2000/svg">
                            <path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path>
                        </svg>
                    </label>

                    <input id="rating-2" type="radio" name="rating" value="2" />
                    <label for="rating-2" title="2 stars">
                        <svg viewBox="0 0 576 512" xmlns="http://www.w3.org/2000/svg">
                            <path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path>
                        </svg>
                    </label>

                    <input id="rating-1" type="radio" name="rating" value="1" />
                    <label for="rating-1" title="1 star">
                        <svg viewBox="0 0 576 512" xmlns="http://www.w3.org/2000/svg">
                            <path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path>
                        </svg>
                    </label>
                </div>
            </div>
        </div>

        <div class="review-text">
            <h3>Write a Review</h3>
            <textarea id="review" rows="5" placeholder="Write your review here..."></textarea>
        </div>

        <button id="submit-review">Submit Review</button>
    </div>
</body>
</html>

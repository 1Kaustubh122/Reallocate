<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Rental Listing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        form {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
        }

        label {
            display: block;
            margin: 10px 0 5px;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <h2>List a Product for Rent</h2>

    <form action="/submit-product" method="POST" enctype="multipart/form-data">
        
        <!-- Product Type -->
        <label for="product-type">Product Type</label>
        <input type="text" id="product-type" name="product-type" placeholder="Enter product type" required>

        <!-- Product Name -->
        <label for="product-name">Product Name</label>
        <input type="text" id="product-name" name="product-name" placeholder="Enter product name" required>

        <!-- Product Images -->
        <label for="product-images">Product Images</label>
        <input type="file" id="product-images" name="product-images" accept="image/*" multiple required>

        <!-- Product Working Video -->
        <label for="product-video">Product Working Video</label>
        <input type="file" id="product-video" name="product-video" accept="video/*" required>

        <!-- Date of Purchase -->
        <label for="purchase-date">Date of Purchase</label>
        <input type="date" id="purchase-date" name="purchase-date" required>

        <!-- Product Description -->
        <label for="product-description">Product Description</label>
        <textarea id="product-description" name="product-description" rows="5" placeholder="Enter a detailed description of the product" required></textarea>

        <!-- Submit Button -->
        <button type="submit">Submit Product</button>

    </form>

</body>
</html>
